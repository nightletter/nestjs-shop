openapi: 3.0.0
info:
  title: Shop API
  version: 1.0.0
  description: JWT 기반 쇼핑몰 API

servers:
  - url: http://localhost:3000
    description: Development server

paths:
  /auth/signup:
    post:
      summary: 회원가입
      description: 이메일과 비밀번호로 새로운 사용자를 등록합니다.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: 사용자 이메일
                  example: user@example.com
                password:
                  type: string
                  format: password
                  description: 사용자 비밀번호 (최소 6자 이상 권장)
                  example: password123
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                    description: 사용자 ID
                    example: 1
                  email:
                    type: string
                    description: 사용자 이메일
                    example: user@example.com
                  nickname:
                    type: string
                    description: 자동 생성된 닉네임
                    example: user
                  message:
                    type: string
                    description: 성공 메시지
                    example: User registered successfully
        '400':
          description: 잘못된 요청 (필수 필드 누락, 이미 가입된 이메일 등)
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 400
                  message:
                    type: string
                    example: email and password are required
        '409':
          description: 이미 가입된 이메일
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 409
                  message:
                    type: string
                    example: User with this email already exists

  /auth/login:
    post:
      summary: 로그인
      description: 이메일과 비밀번호로 사용자를 인증하고 JWT 토큰을 발급합니다.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: 사용자 이메일
                  example: user@example.com
                password:
                  type: string
                  format: password
                  description: 사용자 비밀번호
                  example: password123
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: JWT Access Token (1시간 유효)
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  refreshToken:
                    type: string
                    description: JWT Refresh Token (7일 유효)
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    type: object
                    properties:
                      id:
                        type: number
                        example: 1
                      email:
                        type: string
                        example: user@example.com
                      nickname:
                        type: string
                        example: user
        '400':
          description: 잘못된 요청 (필수 필드 누락)
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 400
                  message:
                    type: string
                    example: email and password are required
        '401':
          description: 인증 실패 (잘못된 이메일 또는 비밀번호)
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 401
                  message:
                    type: string
                    example: Invalid email or password

  /users:
    get:
      summary: 모든 사용자 조회
      description: 등록된 모든 사용자의 목록을 조회합니다.
      tags:
        - Users
      responses:
        '200':
          description: 사용자 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      summary: 사용자 생성
      description: 새로운 사용자를 생성합니다.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - nickname
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: password123
                nickname:
                  type: string
                  example: John Doe
      responses:
        '201':
          description: 사용자 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: 잘못된 요청

  /users/{id}:
    get:
      summary: 특정 사용자 조회
      description: JWT 토큰이 필요합니다. 사용자 ID로 특정 사용자의 정보를 조회합니다.
      tags:
        - Users
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: number
          description: 사용자 ID
          example: 1
      responses:
        '200':
          description: 사용자 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: 인증되지 않음 (JWT 토큰 필요)
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 401
                  message:
                    type: string
                    example: No token provided
        '404':
          description: 사용자를 찾을 수 없음
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: number
                    example: 404
                  message:
                    type: string
                    example: User with id 1 not found

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: number
          description: 사용자 ID
          example: 1
        email:
          type: string
          format: email
          description: 사용자 이메일
          example: user@example.com
        password:
          type: string
          description: 해시된 비밀번호
          example: $2b$10$...
        nickname:
          type: string
          description: 사용자 닉네임
          example: John Doe
        isActive:
          type: boolean
          description: 사용자 활성 상태
          example: true
        createAt:
          type: string
          format: date-time
          description: 생성 날짜
          example: 2024-03-16T11:59:21.625Z
        updateAt:
          type: string
          format: date-time
          description: 수정 날짜
          example: 2024-03-16T11:59:21.625Z

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT 토큰 인증

security:
  - BearerAuth: []
