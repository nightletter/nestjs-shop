<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOPPE — 로그인</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/auth.js"></script>
</head>
<body>

<div class="center">
  <div class="card">
    <div class="logo">SHOPPE</div>

    <div class="fields">
      <div class="field-wrap">
        <label class="field-label" for="loginId">아이디</label>
        <input type="email" id="loginId" />
      </div>
      <div class="field-wrap">
        <label class="field-label" for="pw">비밀번호</label>
        <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>

    <button class="btn btn-dark" id="btn-login">로그인</button>
  </div>
</div>

<script>
  // 토큰이 이미 있으면 products 페이지로 리다이렉트
  if (Auth.isAuthenticated()) {
    window.location.href = '/products';
  }

  function showShake() {
    const card = document.querySelector('.card');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
  }

  function showError(message) {
    showShake();
    window.alert(message);
  }

  async function tryLogin() {
    const loginId = document.getElementById('loginId').value.trim();
    const pw = document.getElementById('pw').value.trim();
    if (!loginId || !pw) {
      showShake();
      return;
    }

    const loginResult = await Auth.login(loginId, pw);
    if (loginResult.ok) {
      Auth.setAuth(loginResult.data);
      window.location.href = '/products';
      return;
    }

    if (loginResult.status !== 401) {
      const message =
        typeof loginResult.data.message === 'string'
          ? loginResult.data.message
          : '로그인 처리 중 오류가 발생했습니다.';
      showError(message);
      return;
    }

    const signupResult = await Auth.signup(loginId, pw);
    if (!signupResult.ok) {
      showError('이메일 또는 비밀번호가 올바르지 않습니다.');
      return;
    }

    const retryLoginResult = await Auth.login(loginId, pw);
    if (!retryLoginResult.ok) {
      showError('로그인 처리 중 오류가 발생했습니다.');
      return;
    }

    Auth.setAuth(retryLoginResult.data);
    window.location.href = '/products';
  }

  document.getElementById('btn-login').addEventListener('click', tryLogin);
  ['loginId', 'pw'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => e.key === 'Enter' && tryLogin()),
  );
</script>
</body>
</html>
