<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOPPE — 결제완료</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/alert.css" />
  <script src="/auth.js"></script>
  <script src="/sse.js"></script>
  <script src="/alert.js"></script>
  <style>
    .status-message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
    }
    .status-processing {
      background-color: #fff3cd;
      color: #856404;
    }
    .status-success {
      background-color: #d4edda;
      color: #155724;
    }
    .status-failed {
      background-color: #f8d7da;
      color: #721c24;
    }
    .check-wrap.failed {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    }
    .check-wrap.processing {
      background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
    }
  </style>
</head>
<body>

<div class="center">
  <div class="card complete-card">
    <div class="check-wrap" id="status-icon">
      <svg id="icon-svg" width="30" height="30" viewBox="0 0 30 30" fill="none"
           stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <!-- 초기: 처리중 아이콘 (원) -->
        <circle cx="15" cy="15" r="10"/>
      </svg>
    </div>

    <div class="complete-title" id="page-title">결제 처리중</div>
    <div class="complete-sub" id="page-subtitle">주문을 확인하고 있습니다.<br/>잠시만 기다려주세요.</div>

    <div class="order-summary">
      <div class="order-row">
        <span>주문 번호</span>
        <span id="order-num">—</span>
      </div>
      <div class="order-row">
        <span>상품</span>
        <span id="product-name">Pro Wireless Studio</span>
      </div>
      <div class="order-sep"></div>
      <div class="order-row order-total">
        <span>결제 금액</span>
        <span id="total-amount">—</span>
      </div>
    </div>

    <div id="status-message"></div>

    <button class="btn btn-dark" onclick="handleHomeClick()" id="home-btn" style="display:none; margin-top: 15px;">쇼핑 계속하기</button>
  </div>
</div>

<script>
  // 인증 확인
  if (!Auth.requireAuth()) {
    // requireAuth에서 이미 리다이렉트 처리
  }

  // 네비게이션 바 렌더링
  Auth.renderNavbar();

  const urlParams = new URLSearchParams(window.location.search);
  const orderNumber = urlParams.get('orderId') || '';
  const orderId = sessionStorage.getItem('orderId')

  // 주문 번호 표시 (orderId에서 추출)
  document.getElementById('order-num').textContent = orderNumber || '#SH-00000';
  
  // 초기 결제 금액 표시 (URL 파라미터에서)
  const initialAmount = Number(urlParams.get('amount') || 0);
  if (initialAmount > 0) {
    document.getElementById('total-amount').textContent = `₩${initialAmount.toLocaleString('ko-KR')}`;
  }
  let pollingInterval = null;
  let pollingCount = 0;
  const MAX_POLLING_COUNT = 10; // 최대 30번 (30초)

  // 아이콘 변경 함수
  function updateIcon(type) {
    const iconWrap = document.getElementById('status-icon');
    const iconSvg = document.getElementById('icon-svg');
    
    iconWrap.className = 'check-wrap';
    
    if (type === 'success') {
      // 체크 아이콘
      iconSvg.innerHTML = '<polyline points="6 15 12 21 24 9"/>';
    } else if (type === 'failed') {
      // X 아이콘
      iconWrap.classList.add('failed');
      iconSvg.innerHTML = '<line x1="9" y1="9" x2="21" y2="21"/><line x1="21" y1="9" x2="9" y2="21"/>';
    } else if (type === 'processing') {
      // 처리중 아이콘 (원)
      iconWrap.classList.add('processing');
      iconSvg.innerHTML = '<circle cx="15" cy="15" r="10"/>';
    }
  }

  // 결제 확인 API 호출
  async function confirm() {
    const data = {
      paymentType: urlParams.get('paymentType'),
      paymentKey: urlParams.get('paymentKey'),
      orderId: urlParams.get('orderId'),
      amount: Number(urlParams.get('amount')),
    }

    try {
      const response = await fetch('/api/order/confirm', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(data),
      });

      if (response.ok) {
        console.log('결제 확인 요청 성공');
        // 확인 요청 후 polling 시작
        startPolling();
      } else {
        showError('결제 확인 요청에 실패했습니다.');
      }
    } catch (error) {
      console.error('결제 확인 실패:', error);
      showError('결제 확인 중 오류가 발생했습니다.');
    }
  }

  // 주문 상태 조회 API
  async function checkOrderStatus() {
    if (!orderId) {
      console.error('주문 ID가 없습니다.');
      stopPolling();
      showError('주문 정보를 찾을 수 없습니다.');
      return;
    }

    try {
      const response = await Auth.fetch(`/api/order/${orderId}/status`, {
        method: 'GET',
      });

      if (response.ok) {
        const data = await response.json();
        handleOrderStatus(data.status, data.totalAmount);
      } else {
        console.error('주문 상태 조회 실패:', response.status);
      }
    } catch (error) {
      console.error('주문 상태 조회 오류:', error);
      // Auth.fetch에서 401/403은 이미 처리됨
    }

    pollingCount++;
    if (pollingCount >= MAX_POLLING_COUNT) {
      stopPolling();
      showError('주문 처리 시간이 초과되었습니다. 고객센터로 문의해주세요.');
    }
  }

  // 주문 상태에 따른 UI 업데이트
  function handleOrderStatus(status, totalAmount) {
    console.log('주문 상태:', status);

    // 결제 금액 표시
    if (totalAmount !== undefined) {
      const amountElement = document.getElementById('total-amount');
      if (amountElement) {
        amountElement.textContent = `₩${totalAmount.toLocaleString('ko-KR')}`;
      }
    }

    if (status === 'COMPLETED') {
      stopPolling();
      showSuccess();
      clearUpOrderIdInSessionStorage()
    } else if (status === 'FAILED') {
      stopPolling();
      showError('결제에 실패했습니다. 다시 시도해주세요.');
      clearUpOrderIdInSessionStorage()
    } else if (status === 'IN_PROGRESS' || status === 'CREATED') {
      // 계속 polling
      showProcessing();
    }
  }

  // Polling 시작
  function startPolling() {
    pollingInterval = setInterval(checkOrderStatus, 2_000);
  }

  // Polling 중지
  function stopPolling() {
    if (pollingInterval) {
      clearInterval(pollingInterval);
      pollingInterval = null;
    }
  }

  // 처리중 UI
  function showProcessing() {
    updateIcon('processing');
    const statusDiv = document.getElementById('status-message');
    statusDiv.className = 'status-message status-processing';
    statusDiv.textContent = '결제를 처리하고 있습니다...';
  }

  // SSE 연결 함수
  function connectSSE() {
    const userId = Auth.getUser()?.id;
    if (!userId) {
      console.error('사용자 ID를 찾을 수 없습니다.');
      return;
    }

    SSE.connect(userId, {
      onOpen: () => {
        console.log('✅ SSE 연결 완료');
      },
      onMessage: (data) => {
        console.log('📨 실시간 이벤트:', data);
      },
      onError: (error) => {
        console.error('❌ SSE 연결 오류:', error);
      }
    });

    // 특정 이벤트 타입별 처리
    SSE.on('payment.completed', (data) => {
      console.log('결제 완료 이벤트:', data);
    });

    SSE.on('points.earned', (data) => {
      console.log('포인트 적립 이벤트:', data);
      
      // 예쁜 포인트 적립 알림 표시
      const points = data.points || data.amount || 0;
      Alert.showPointsEarned(points);
      
      // 네비게이션 바 포인트 갱신
      Auth.loadPoints();
    });

    SSE.on('order.shipped', (data) => {
      console.log('배송 시작 이벤트:', data);
    });
  }

  // 성공 UI
  async function showSuccess() {
    updateIcon('success');
    document.getElementById('page-title').textContent = '결제 완료';
    document.getElementById('page-subtitle').innerHTML = '주문이 접수되었습니다.<br/>확인 메일이 곧 발송됩니다.';

    // 홈으로 가기 버튼 표시
    document.getElementById('home-btn').style.display = 'block';

    // 네비게이션 바 포인트 갱신 (Consumer 처리 대기 후)
    await refreshNavbarPoints();
  }

  // 네비게이션 바 포인트 갱신
  async function refreshNavbarPoints() {
    try {
      // 포인트 적립 처리를 위해 잠시 대기 (Consumer 처리 시간)
      await new Promise(resolve => setTimeout(resolve, 1000));
      
      // 네비게이션 바의 포인트 갱신
      Auth.loadPoints();
    } catch (error) {
      console.error('포인트 갱신 실패:', error);
      // 실패해도 UI는 계속 진행
    }
  }

  // 실패 UI
  function showError(message) {
    updateIcon('failed');
    document.getElementById('page-title').textContent = '결제 실패';
    document.getElementById('page-subtitle').innerHTML = '죄송합니다.<br/>결제 처리 중 문제가 발생했습니다.';

    document.getElementById('home-btn').style.display = 'block';
  }

  // 페이지 로드 시 실행
  updateIcon('processing');
  
  // 페이지 초기화 함수
  async function initializePage() {
    // URL에 결제 정보가 있는지 확인
    const paymentKey = urlParams.get('paymentKey');
    const paymentType = urlParams.get('paymentType');
    
    if (!orderId) {
      showError('주문 정보를 찾을 수 없습니다.');
      return;
    }

    // URL에 결제 정보가 있으면 confirm 호출 (토스 결제 완료 직후)
    if (paymentKey && paymentType) {
      console.log('결제 완료 → confirm 호출');
      await confirm();
    } else {
      // URL에 결제 정보가 없으면 바로 polling 시작 (새로고침 또는 직접 접근)
      console.log('결제 정보 없음 → polling만 시작');
      startPolling();
    }
  }

  // 홈 버튼 클릭 핸들러
  function handleHomeClick() {
    cleanup();
    window.location.href = '/products';
  }

  // SSE 연결 정리 함수
  function disconnectSSE() {
    if (SSE.isConnected()) {
      console.log('🔌 SSE 연결 종료');
      SSE.disconnect();
    }
  }

  // 페이지 정리 함수
  function cleanup() {
    stopPolling();
    disconnectSSE();
  }

  // DOM 로드 완료 시 SSE 연결
  document.addEventListener('DOMContentLoaded', () => {
    connectSSE();
  });

  // 페이지 초기화 실행
  initializePage();

  // 페이지 언로드 시 정리 (여러 이벤트로 확실하게 처리)
  window.addEventListener('beforeunload', cleanup);
  window.addEventListener('pagehide', cleanup);
  
  // 페이지를 벗어날 때 (뒤로가기, 링크 클릭 등)
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      disconnectSSE();
    }
  });

  function clearUpOrderIdInSessionStorage() {
    if (orderId) {
      sessionStorage.removeItem('orderId');
      console.log(sessionStorage.getItem('orderId'));
    }

    console.log(sessionStorage.getItem('orderId'));
  }
</script>
</body>
</html>
