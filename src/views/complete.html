<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOPPE — 결제완료</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/alert.css" />
  <script src="/auth.js"></script>
  <script src="/sse.js"></script>
  <script src="/alert.js"></script>
  <style>
    .status-message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
    }
    .status-processing {
      background-color: #fff3cd;
      color: #856404;
    }
    .status-success {
      background-color: #d4edda;
      color: #155724;
    }
    .status-failed {
      background-color: #f8d7da;
      color: #721c24;
    }
    .check-wrap.failed {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    }
    .check-wrap.processing {
      background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
    }
  </style>
</head>
<body>

<div class="center">
  <div class="card complete-card">
    <div class="check-wrap" id="status-icon">
      <svg id="icon-svg" width="30" height="30" viewBox="0 0 30 30" fill="none"
           stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <!-- 초기: 처리중 아이콘 (원) -->
        <circle cx="15" cy="15" r="10"/>
      </svg>
    </div>

    <div class="complete-title" id="page-title">결제 처리중</div>
    <div class="complete-sub" id="page-subtitle">주문을 확인하고 있습니다.<br/>잠시만 기다려주세요.</div>

    <div class="order-summary">
      <div class="order-row">
        <span>주문 번호</span>
        <span id="order-num">—</span>
      </div>
      <div class="order-row">
        <span>상품</span>
        <span id="product-name">Pro Wireless Studio</span>
      </div>
      <div class="order-sep"></div>
      <div class="order-row order-total">
        <span>결제 금액</span>
        <span id="total-amount">—</span>
      </div>
    </div>

    <div id="status-message"></div>

    <button class="btn btn-dark" onclick="handleHomeClick()" id="home-btn" style="display:none; margin-top: 15px;">쇼핑 계속하기</button>
  </div>
</div>

<script>
  const SESSION_ORDER_ID_KEY = 'orderId';
  const POLLING_INTERVAL_MS = 2_000;
  const MAX_POLLING_COUNT = 10;

  // 인증 확인
  if (!Auth.requireAuth()) {
    // requireAuth에서 이미 리다이렉트 처리
  }

  // 네비게이션 바 렌더링
  Auth.renderNavbar();

  const urlParams = new URLSearchParams(window.location.search);
  const orderNumber = urlParams.get('orderId') || '';
  const orderEntityId = sessionStorage.getItem(SESSION_ORDER_ID_KEY) || '';
  const initialAmount = Number(urlParams.get('amount') || 0);
  const paymentType = urlParams.get('paymentType') || '';
  const paymentKey = urlParams.get('paymentKey') || '';

  document.getElementById('order-num').textContent = orderNumber || '#SH-00000';
  if (initialAmount > 0) {
    document.getElementById('total-amount').textContent =
      `₩${initialAmount.toLocaleString('ko-KR')}`;
  }

  let pollingInterval = null;
  let pollingCount = 0;

  // 아이콘 변경 함수
  function updateIcon(type) {
    const iconWrap = document.getElementById('status-icon');
    const iconSvg = document.getElementById('icon-svg');
    
    iconWrap.className = 'check-wrap';
    
    if (type === 'success') {
      // 체크 아이콘
      iconSvg.innerHTML = '<polyline points="6 15 12 21 24 9"/>';
    } else if (type === 'failed') {
      // X 아이콘
      iconWrap.classList.add('failed');
      iconSvg.innerHTML = '<line x1="9" y1="9" x2="21" y2="21"/><line x1="21" y1="9" x2="9" y2="21"/>';
    } else if (type === 'processing') {
      // 처리중 아이콘 (원)
      iconWrap.classList.add('processing');
      iconSvg.innerHTML = '<circle cx="15" cy="15" r="10"/>';
    }
  }

  function clearOrderIdInSessionStorage() {
    if (orderEntityId) {
      sessionStorage.removeItem(SESSION_ORDER_ID_KEY);
    }
  }

  function showProcessing() {
    updateIcon('processing');
    const statusDiv = document.getElementById('status-message');
    statusDiv.className = 'status-message status-processing';
    statusDiv.textContent = '결제를 처리하고 있습니다...';
  }

  async function refreshNavbarPoints() {
    try {
      await new Promise(resolve => setTimeout(resolve, 1000));
      Auth.loadPoints();
    } catch (error) {
      console.error('포인트 갱신 실패:', error);
    }
  }

  async function showSuccess() {
    updateIcon('success');
    document.getElementById('page-title').textContent = '결제 완료';
    document.getElementById('page-subtitle').innerHTML =
      '주문이 접수되었습니다.<br/>확인 메일이 곧 발송됩니다.';
    document.getElementById('home-btn').style.display = 'block';
    clearOrderIdInSessionStorage();
    await refreshNavbarPoints();
  }

  function showError(message) {
    updateIcon('failed');
    document.getElementById('page-title').textContent = '결제 실패';
    document.getElementById('page-subtitle').innerHTML =
      '죄송합니다.<br/>결제 처리 중 문제가 발생했습니다.';
    document.getElementById('home-btn').style.display = 'block';

    const statusDiv = document.getElementById('status-message');
    statusDiv.className = 'status-message status-failed';
    statusDiv.textContent = message;
  }

  function updateAmount(totalAmount) {
    if (totalAmount === undefined) {
      return;
    }

    const amountElement = document.getElementById('total-amount');
    if (amountElement) {
      amountElement.textContent = `₩${totalAmount.toLocaleString('ko-KR')}`;
    }
  }

  function stopPolling() {
    if (!pollingInterval) {
      return;
    }
    clearInterval(pollingInterval);
    pollingInterval = null;
  }

  function handleOrderStatus(status, totalAmount) {
    updateAmount(totalAmount);

    if (status === 'COMPLETED') {
      stopPolling();
      void showSuccess();
      return;
    }

    if (status === 'FAILED') {
      stopPolling();
      clearOrderIdInSessionStorage();
      showError('결제에 실패했습니다. 다시 시도해주세요.');
      return;
    }

    if (status === 'IN_PROGRESS' || status === 'CREATED') {
      showProcessing();
    }
  }

  async function checkOrderStatus() {
    if (!orderEntityId) {
      stopPolling();
      showError('주문 정보를 찾을 수 없습니다.');
      return;
    }

    try {
      const response = await Auth.fetch(`/api/order/${orderEntityId}/status`, {
        method: 'GET',
      });

      if (response.ok) {
        const data = await response.json();
        handleOrderStatus(data.status, data.totalAmount);
      } else {
        console.error('주문 상태 조회 실패:', response.status);
      }
    } catch (error) {
      console.error('주문 상태 조회 오류:', error);
    }

    pollingCount += 1;
    if (pollingCount >= MAX_POLLING_COUNT) {
      stopPolling();
      showError('주문 처리 시간이 초과되었습니다. 고객센터로 문의해주세요.');
    }
  }

  function startPolling() {
    if (pollingInterval) {
      return;
    }

    pollingInterval = setInterval(checkOrderStatus, POLLING_INTERVAL_MS);
  }

  async function confirmPayment() {
    const payload = {
      paymentType,
      paymentKey,
      orderId: orderNumber,
      amount: initialAmount,
    };

    try {
      const response = await fetch('/api/order/confirm', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(payload),
      });

      if (response.ok) {
        startPolling();
      } else {
        showError('결제 확인 요청에 실패했습니다.');
      }
    } catch (error) {
      console.error('결제 확인 실패:', error);
      showError('결제 확인 중 오류가 발생했습니다.');
    }
  }

  // SSE 연결 함수
  function connectSSE() {
    const userId = Auth.getUser()?.id;
    if (!userId) {
      console.error('사용자 ID를 찾을 수 없습니다.');
      return;
    }

    SSE.connect(userId, {
      onOpen: () => {},
      onMessage: () => {},
      onError: (error) => {
        console.error('SSE 연결 오류:', error);
      },
    });

    // 특정 이벤트 타입별 처리
    SSE.on('payment.completed', () => {});

    SSE.on('points.earned', (data) => {
      const points = data.points || data.amount || 0;
      Alert.showPointsEarned(points);
      Auth.loadPoints();
    });

    SSE.on('order.shipped', () => {});
  }

  async function initializePage() {
    updateIcon('processing');

    if (!orderEntityId) {
      showError('주문 정보를 찾을 수 없습니다.');
      return;
    }

    if (paymentKey && paymentType) {
      await confirmPayment();
    } else {
      startPolling();
    }
  }

  function handleHomeClick() {
    cleanup();
    window.location.href = '/products';
  }

  function disconnectSSE() {
    if (SSE.isConnected()) {
      SSE.disconnect();
    }
  }

  function cleanup() {
    stopPolling();
    disconnectSSE();
  }

  document.addEventListener('DOMContentLoaded', () => {
    connectSSE();
  });

  initializePage();

  window.addEventListener('beforeunload', cleanup);
  window.addEventListener('pagehide', cleanup);

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      disconnectSSE();
    }
  });
</script>
</body>
</html>
