<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOPPE — 상품</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/auth.js"></script>
  <script src="https://js.tosspayments.com/v2/standard"></script>
</head>
<body>

<div class="center" id="products-root">
  <div class="card product-card">
    <div class="product-body">
      <div class="product-name">상품을 불러오는 중...</div>
    </div>
  </div>
</div>

<template id="product-card-template">
  <div class="card product-card">
    <div class="product-visual">🎧</div>
    <div class="product-body">
      <div class="product-name"></div>
      <div class="price-row">
        <span class="price"></span>
        <span class="price-old"></span>
        <span class="price-save"></span>
      </div>
      <div class="use-points">
        <label>
          <input type="checkbox" id="use-all-points" /> 포인트 전액사용
        </label>
        <div class="helper" id="use-points-info">로딩 중...</div>
      </div>
      <div id="payment-method"></div>
      <div id="agreement"></div>
      <button id="payment-button" class="btn btn-dark btn-pay" type="button">구매하기</button>
    </div>
  </div>
</template>

<script>
  // 인증 확인 - 로그인하지 않았으면 로그인 페이지로 리다이렉트
  if (!Auth.requireAuth()) {
    // requireAuth에서 이미 리다이렉트 처리
  }

  // 네비게이션 바 렌더링
  Auth.renderNavbar();

  function toWon(value) {
    return `₩${Number(value).toLocaleString('ko-KR')}`;
  }

  function renderProducts(products) {
    const root = document.getElementById('products-root');
    const template = document.getElementById('product-card-template');
    if (!root || !template) {
      return;
    }

    root.innerHTML = '';

    if (!Array.isArray(products) || products.length === 0) {
      root.innerHTML = `
        <div class="card product-card">
          <div class="product-body">
            <div class="product-name">등록된 상품이 없습니다.</div>
          </div>
        </div>
      `;
      return;
    }

    const product = products[0];
    const fragment = template.content.cloneNode(true);
    const nameElement = fragment.querySelector('.product-name');
    const salePriceElement = fragment.querySelector('.price');
    const priceElement = fragment.querySelector('.price-old');
    const saveElement = fragment.querySelector('.price-save');
    const payButton = fragment.querySelector('.btn-pay');

    const rawPrice = Number(product.price);
    const fallbackSalePrice = Number.isFinite(rawPrice) ? rawPrice : 0;
    const rawSalePrice = Number.isFinite(Number(product.salePrice))
      ? Number(product.salePrice)
      : fallbackSalePrice;
    const normalizedPrice = Math.max(rawPrice, rawSalePrice);
    const normalizedSalePrice = Math.min(rawPrice, rawSalePrice);
    const discountRate =
      normalizedPrice > 0
        ? Math.round(((normalizedPrice - normalizedSalePrice) / normalizedPrice) * 100)
        : 0;

    if (nameElement) {
      nameElement.textContent = String(product.name ?? '');
    }
    if (salePriceElement) {
      salePriceElement.textContent = toWon(normalizedSalePrice);
    }
    if (priceElement) {
      priceElement.textContent = toWon(normalizedPrice);
    }
    if (saveElement) {
      saveElement.textContent = discountRate > 0 ? `${discountRate}% 할인` : '';
    }
    if (payButton) {
      payButton.dataset.productId = String(product.id ?? '');
      payButton.dataset.productName = String(product.name ?? '상품');
      payButton.dataset.productPrice = String(normalizedSalePrice);
    }

    root.appendChild(fragment);
    return {
      productId: Number(product.id),
      salePrice: normalizedSalePrice,
      productName: String(product.name ?? '상품'),
    };
  }

  async function loadProducts() {
    try {
      const response = await Auth.fetch('/api/products', {
        method: 'GET',
      });

      if (!response.ok) {
        throw new Error('상품 목록 조회 실패');
      }

      const products = await response.json();
      const rendered = await renderProducts(products);
      if (rendered) {
        await main(rendered);
      }
    } catch (error) {
      console.error(error);
      const root = document.getElementById('products-root');
      if (root) {
        root.innerHTML = `
          <div class="card product-card">
            <div class="product-body">
              <div class="product-name">상품을 불러오지 못했습니다.</div>
            </div>
          </div>
        `;
      }
    }
  }

  loadProducts();

  async function main(rendered) {
    const button = document.getElementById('payment-button');
    if (!(button instanceof HTMLButtonElement)) {
      return;
    }

    // ------  결제위젯 초기화 ------
    const clientKey = 'test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm';
    const tossPayments = TossPayments(clientKey);
    // 회원 결제
    const customerKey = 'pwbpuTKS5EfAH1htz3yKx';
    const widgets = tossPayments.widgets({
      customerKey,
    });

    // 포인트 잔액 확인 및 초기 결제 금액 설정
    let pointsBalance = 0;
    try {
      const data = await Auth.fetchJson('/api/points/balance');
      pointsBalance = Number(data.balance || 0);
    } catch (e) {
      pointsBalance = 0;
    }

    const pointsCheckbox = document.getElementById('use-all-points');
    const pointsInfo = document.getElementById('use-points-info');

    const computeRemaining = () => {
      const useAll = pointsCheckbox instanceof HTMLInputElement && pointsCheckbox.checked;
      return Math.max(rendered.salePrice - (useAll ? pointsBalance : 0), 0);
    };

    const updatePointsInfo = (remaining) => {
      if (!pointsInfo) return;
      if (pointsBalance <= 0) {
        pointsInfo.textContent = '포인트 잔액이 없습니다.';
      } else {
        const used = Math.min(pointsBalance, rendered.salePrice);
        if (remaining === 0) {
          pointsInfo.textContent = `포인트 ${used.toLocaleString()}원으로 전액 결제됩니다.`;
        } else if (used > 0) {
          pointsInfo.textContent = `포인트 ${used.toLocaleString()}원 사용 후 결제 금액: ${remaining.toLocaleString()}원`;
        } else {
          pointsInfo.textContent = `포인트 잔액: ${pointsBalance.toLocaleString()}원`;
        }
      }
    };

    // 초기 렌더링 전 결제 금액 설정
    const initialRemaining = computeRemaining();
    await widgets.setAmount({ currency: 'KRW', value: initialRemaining });
    updatePointsInfo(initialRemaining);

    // 렌더링 후 위젯 표시
    await Promise.all([
      widgets.renderPaymentMethods({
        selector: '#payment-method',
        variantKey: 'DEFAULT',
      }),
      widgets.renderAgreement({ selector: '#agreement', variantKey: 'AGREEMENT' }),
    ]);

    // 체크박스 변경 시 금액 업데이트
    if (pointsCheckbox instanceof HTMLInputElement) {
      pointsCheckbox.addEventListener('change', async () => {
        const remaining = computeRemaining();
        try {
          await widgets.setAmount({ currency: 'KRW', value: remaining });
        } catch (e) {
          // ignore widget errors
        }
        updatePointsInfo(remaining);
      });
    }

    button.addEventListener('click', async () => {
      try {
        const orderResponse = await Auth.fetch('/api/order', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            productId: rendered.productId,
            salePrice: rendered.salePrice,
            useAllPoints: !!document.getElementById('use-all-points')?.checked,
          }),
        });

        if (!orderResponse.ok) {
          throw new Error('주문 생성 실패');
        }

        const createdOrder = await orderResponse.json();
        const orderId = String(createdOrder.orderNumber ?? '');

        if (!orderId) {
          throw new Error('주문 번호가 없습니다.');
        }

        // orderId를 localStorage에 저장 (complete.html에서 polling에 사용)
        localStorage.setItem('currentOrderId', createdOrder.id);
        localStorage.setItem('orderNum', orderId);

        // 결제할 남은 금액을 계산
        const useAll = document.getElementById('use-all-points')?.checked === true;
        let pointsBalanceAfter = pointsBalance;
        try {
          const data = await Auth.fetchJson('/api/points/balance');
          pointsBalanceAfter = Number(data.balance || 0);
        } catch (e) {
          pointsBalanceAfter = pointsBalance;
        }
        const remainingToPay = Math.max(rendered.salePrice - (useAll ? pointsBalanceAfter : 0), 0);

        if (remainingToPay === 0) {
          // 포인트로 전액 결제된 경우 결제 위젯 호출 없이 완료 페이지로 이동
          window.location.href = '/order/complete';
          return;
        }

        await widgets.requestPayment({
          orderId,
          orderName: rendered.productName,
          successUrl: window.location.origin + '/order/complete',
          failUrl: window.location.origin + '/order/fail',
          customerEmail: 'customer123@gmail.com',
          customerName: '김토스',
          customerMobilePhone: '01012341234',
          windowTarget:'self'
        });
      } catch (e) {
        console.log(e);
        return;
      }

    });

  }
</script>
</body>
</html>
