<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOPPE — 상품</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<div class="center">
  <div class="card product-card">
    <div class="product-visual">🎧</div>
    <div class="product-body">
      <div class="product-name">Pro Wireless<br/>Studio Headphones</div>
      <div class="price-row">
        <span class="price">₩189,000</span>
        <span class="price-old">₩259,000</span>
        <span class="price-save">27% 할인</span>
      </div>
      <button class="btn btn-dark" id="btn-pay">구매하기</button>
    </div>
  </div>
</div>

<script>
  document.getElementById('btn-pay').addEventListener('click', () => {
    const orderNum = '#SH-' + Math.floor(10000 + Math.random() * 90000);
    sessionStorage.setItem('orderNum', orderNum);
    window.location.href = '/order/complate';
  });
</script>
</body>
</html>
